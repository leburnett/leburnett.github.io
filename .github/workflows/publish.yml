name: Build and Deploy Quarto Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render
        uses: quarto-dev/quarto-actions/render@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt personal blog pages
        run: |
          echo "=== Files to encrypt ==="
          find _site/blog/personal -name "*.html" -print

          # Encrypt each file and replace the original with the encrypted version
          find _site/blog/personal -name "*.html" -print | while read -r file; do
            echo "Encrypting: $file"
            dir=$(dirname "$file")
            npx staticrypt@3 "$file" \
              -p "$STATICRYPT_PASSWORD" \
              --remember 30 \
              -d "$dir" \
              --template-title "Personal Blog - Password Required" \
              --template-instructions "This content is for friends and family. Enter the password to continue."

            # StaticCrypt creates <filename>_encrypted.html — replace the original
            base=$(basename "$file" .html)
            encrypted="$dir/${base}_encrypted.html"
            if [ -f "$encrypted" ]; then
              mv "$encrypted" "$file"
              echo "  Replaced $file with encrypted version"
            else
              echo "  WARNING: Encrypted file not found at $encrypted"
              ls -la "$dir/"
            fi
          done

          echo "=== Encryption complete ==="
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
