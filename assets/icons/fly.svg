<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor" stroke="currentColor">
  <!-- Body -->
  <ellipse cx="50" cy="52" rx="14" ry="22" fill="currentColor" stroke="none"/>
  <!-- Head -->
  <circle cx="50" cy="26" r="8" fill="currentColor" stroke="none"/>
  <!-- Eyes -->
  <circle cx="44" cy="23" r="4" fill="currentColor" stroke="none"/>
  <circle cx="56" cy="23" r="4" fill="currentColor" stroke="none"/>
  <!-- Left wing -->
  <ellipse cx="28" cy="42" rx="20" ry="10" fill="none" stroke-width="2.5" transform="rotate(-25 28 42)"/>
  <!-- Right wing -->
  <ellipse cx="72" cy="42" rx="20" ry="10" fill="none" stroke-width="2.5" transform="rotate(25 72 42)"/>
  <!-- Wing veins left -->
  <line x1="18" y1="36" x2="38" y2="44" stroke-width="1" fill="none"/>
  <line x1="14" y1="42" x2="38" y2="44" stroke-width="1" fill="none"/>
  <!-- Wing veins right -->
  <line x1="82" y1="36" x2="62" y2="44" stroke-width="1" fill="none"/>
  <line x1="86" y1="42" x2="62" y2="44" stroke-width="1" fill="none"/>
  <!-- Antennae -->
  <line x1="46" y1="20" x2="38" y2="10" stroke-width="2" fill="none"/>
  <line x1="54" y1="20" x2="62" y2="10" stroke-width="2" fill="none"/>
  <!-- Legs left -->
  <line x1="40" y1="42" x2="28" y2="52" stroke-width="1.5" fill="none"/>
  <line x1="38" y1="52" x2="24" y2="60" stroke-width="1.5" fill="none"/>
  <line x1="38" y1="62" x2="22" y2="72" stroke-width="1.5" fill="none"/>
  <!-- Legs right -->
  <line x1="60" y1="42" x2="72" y2="52" stroke-width="1.5" fill="none"/>
  <line x1="62" y1="52" x2="76" y2="60" stroke-width="1.5" fill="none"/>
  <line x1="62" y1="62" x2="78" y2="72" stroke-width="1.5" fill="none"/>
  <!-- Body segments -->
  <line x1="38" y1="45" x2="62" y2="45" stroke-width="1" opacity="0.4" fill="none"/>
  <line x1="37" y1="52" x2="63" y2="52" stroke-width="1" opacity="0.4" fill="none"/>
  <line x1="37" y1="59" x2="63" y2="59" stroke-width="1" opacity="0.4" fill="none"/>
  <line x1="38" y1="66" x2="62" y2="66" stroke-width="1" opacity="0.4" fill="none"/>
</svg>
