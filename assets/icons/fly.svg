<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <ellipse cx="12" cy="5.5" rx="2.5" ry="2" fill="currentColor" stroke="none"/>
  <!-- Eyes -->
  <circle cx="10.2" cy="5" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="13.8" cy="5" r="1.2" fill="currentColor" stroke="none"/>
  <!-- Antennae -->
  <path d="M10.5 4 L8 1.5" fill="none"/>
  <path d="M13.5 4 L16 1.5" fill="none"/>
  <!-- Thorax -->
  <ellipse cx="12" cy="9" rx="2.8" ry="2.5" fill="currentColor" stroke="none"/>
  <!-- Abdomen -->
  <ellipse cx="12" cy="15" rx="3.2" ry="5" fill="currentColor" stroke="none"/>
  <!-- Abdomen segments -->
  <line x1="9.8" y1="12.5" x2="14.2" y2="12.5" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="9.6" y1="14.5" x2="14.4" y2="14.5" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="9.8" y1="16.5" x2="14.2" y2="16.5" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <!-- Left wing -->
  <ellipse cx="8" cy="11" rx="5.5" ry="2.2" fill="none" stroke-width="0.5" transform="rotate(-25 8 11)"/>
  <!-- Right wing -->
  <ellipse cx="16" cy="11" rx="5.5" ry="2.2" fill="none" stroke-width="0.5" transform="rotate(25 16 11)"/>
  <!-- Legs left -->
  <path d="M9.5 8.5 L6.5 11" fill="none" stroke-width="0.8"/>
  <path d="M9.5 10 L6 13" fill="none" stroke-width="0.8"/>
  <path d="M9.8 11.5 L6 15.5" fill="none" stroke-width="0.8"/>
  <!-- Legs right -->
  <path d="M14.5 8.5 L17.5 11" fill="none" stroke-width="0.8"/>
  <path d="M14.5 10 L18 13" fill="none" stroke-width="0.8"/>
  <path d="M14.2 11.5 L18 15.5" fill="none" stroke-width="0.8"/>
</svg>
